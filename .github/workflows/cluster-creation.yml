name: Cluster Creation & Helm Bootstrap

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS region"
        required: true
        default: "ap-southeast-1"
      cilium:
        type: choice
        description: "Deploy with Cilium?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true
      nginx-ingress:
        type: choice
        description: "Deploy Nginx Ingress Controller?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true
      external-dns:
        type: choice
        description: "Deploy ExternalDNS?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true
      cert-manager:
        type: choice
        description: "Deploy CertManager?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true
      argocd:
        type: choice
        description: "Deploy ArgoCD?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true
      monitoring:
        type: choice
        description: "Deploy Prometheus and Grafana?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true
      logging:
        type: choice
        description: "Deploy Loki?"
        options:
          - "true"
          - "false"
        default: "false"
        required: true

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:
  OIDC_ROLE: arn:aws:iam::255945442255:role/shared-eks-cluster-deployer-role

jobs:
  deploy:
    name: Create Cluster
    if: ${{ github.event.inputs.cilium == 'false' }}
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.tfout.outputs.CLUSTER_NAME }}
      external_dns_role_arn: ${{ steps.tfout.outputs.EXTERNAL_DNS_ROLE_ARN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Plan
        working-directory: ./terraform/eks-cluster
        env:
          TF_VAR_region: ${{ inputs.region }}
        run: terraform plan
        
      - name: Terraform Apply
        working-directory: ./terraform/eks-cluster
        env:
          TF_VAR_region: ${{ inputs.region }}
        run: terraform apply -auto-approve

      - name: Export terraform outputs
        working-directory: ./terraform/eks-cluster
        id: tfout
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "EXTERNAL_DNS_ROLE_ARN=$(terraform output -json external_dns_role_arn | jq -r '.[0]')" >> $GITHUB_OUTPUT
  
  deploy_cilium_cluster:
    name: Create Cluster with Cilium
    if: ${{ github.event.inputs.cilium == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.tfout.outputs.CLUSTER_NAME }}
      external_dns_role_arn: ${{ steps.tfout.outputs.EXTERNAL_DNS_ROLE_ARN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Plan (Without Node Groups)
        working-directory: ./terraform/eks-cluster
        env:
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_deploy_node_groups: "false"
          TF_VAR_enable_default_network_addons: "false"
          TF_VAR_deploy_cluster_addons: "false"
        run: terraform plan

      - name: Terraform Apply (Without Node Groups)
        working-directory: ./terraform/eks-cluster
        env:
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_deploy_node_groups: "false"
          TF_VAR_enable_default_network_addons: "false"
          TF_VAR_deploy_cluster_addons: "false"
        run: terraform apply -auto-approve

      - name: Export terraform outputs
        working-directory: ./terraform/eks-cluster
        id: tfout
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "CLUSTER_ENDPOINT"=$(terraform output -raw cluster_endpoint) >> $GITHUB_OUTPUT
          echo "EXTERNAL_DNS_ROLE_ARN=$(terraform output -json external_dns_role_arn | jq -r '.[0]')" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ steps.tfout.outputs.CLUSTER_NAME }}

      - name: Deploy Cilium
        run: |
          helm repo add cilium https://helm.cilium.io/
          helm repo update
          helm install cilium cilium/cilium --version 1.16.7 \
            --namespace kube-system \
            --set eni.enabled=true \
            --set ipam.mode=eni \
            --set egressMasqueradeInterfaces=eth0 \
            --set routingMode=native \
            --set k8sServiceHost=${{ steps.tfout.outputs.CLUSTER_ENDPOINT }} \
            --set k8sServicePort=443 \
            --set kubeProxyReplacement=true

      - name: Terraform Plan (With Node Groups)
        working-directory: ./terraform/eks-cluster
        env:
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_deploy_node_groups: "true"
          TF_VAR_enable_default_network_addons: "false"
          TF_VAR_deploy_cluster_addons: "true"
        run: terraform plan

      - name: Terraform Apply (With Node Groups)
        working-directory: ./terraform/eks-cluster
        env:
          TF_VAR_region: ${{ inputs.region }}
          TF_VAR_deploy_node_groups: "true"
          TF_VAR_enable_default_network_addons: "false"
          TF_VAR_deploy_cluster_addons: "true"
        run: terraform apply -auto-approve

  get_cluster_info:
    name: Get Cluster Info
    runs-on: ubuntu-latest
    needs: [deploy, deploy_cilium_cluster]
    outputs:
      cluster_name: ${{ steps.set_outputs.outputs.cluster_name }}
      external_dns_role_arn: ${{ steps.set_outputs.outputs.external_dns_role_arn }}
    steps:
      - name: Set Outputs
        id: set_outputs
        run: |
          if [ "${{ github.event.inputs.cilium }}" == "true" ]; then
            echo "cluster_name=${{ needs.deploy_cilium_cluster.outputs.cluster_name }}" >> $GITHUB_OUTPUT
            echo "external_dns_role_arn=${{ needs.deploy_cilium_cluster.outputs.external_dns_role_arn }}" >> $GITHUB_OUTPUT
          else
            echo "cluster_name=${{ needs.deploy.outputs.cluster_name }}" >> $GITHUB_OUTPUT
            echo "external_dns_role_arn=${{ needs.deploy.outputs.external_dns_role_arn }}" >> $GITHUB_OUTPUT
          fi

  bootstrap:
    runs-on: ubuntu-latest
    needs: [get_cluster_info]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ needs.get_cluster_info.outputs.cluster_name }}

      - name: Deploy Nginx Ingress Controller
        if: ${{ github.event.inputs.nginx-ingress == 'true' }}
        run: |
          cd addons/nginx-ingress
          chmod +x init.sh
          ./init.sh

      - name: Deploy ExternalDNS for Route53
        if: ${{ github.event.inputs.external-dns == 'true' }}
        env:
          REGION: ${{ github.event.inputs.region }}
          EXTERNAL_DNS_ROLE_ARN: ${{ needs.get_cluster_info.outputs.external_dns_role_arn }}
        run: |
          cd addons/r53-externaldns
          envsubst < values.yaml
          chmod +x init.sh
          ./init.sh

      - name: Deploy Cert Manager
        if: ${{ github.event.inputs.cert-manager == 'true' }}
        env:
          EMAIL: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          cd addons/cert-manager
          chmod +x init.sh
          ./init.sh
          
          envsubst < cluster-issuer.yaml | kubectl apply -f -

      - name: Deploy ArgoCD
        if: ${{ github.event.inputs.argocd == 'true' }}
        run: |
          cd addons/argocd
          chmod +x init.sh
          ./init.sh

      - name: Deploy Prometheus and Grafana
        if: ${{ github.event.inputs.monitoring == 'true' }}
        run: |
          cd addons/kube-prometheus-stack
          chmod +x init.sh
          ./init.sh

      - name: Deploy Loki
        if: ${{ github.event.inputs.logging == 'true' }}
        run: |
          cd addons/loki
          chmod +x init.sh
          ./init.sh

