# Use this workflow only if the Github OIDC role to create the cluster has been deleted (create-cluster.yml)
# This workflow creates the OIDC role for the deployer to create the cluster and deploy the addons
name: Create Deployer Role

on: workflow_dispatch

jobs:
  Create-Deployer-Role:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform/eks-cluster-deployer-role

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      
    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply --auto-approve
