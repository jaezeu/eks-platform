# Monthly proof that the platform can be rebuilt from nothing: create both
# cluster types with every addon enabled, let their verify jobs pass, then
# tear down and let verify-cleanup prove nothing was left behind. Reuses the
# same workflows that manual dispatches run.
#
# The precheck makes the rehearsal yield to live infrastructure: cluster names
# and DNS hostnames are fixed, so rehearsing while a cluster is up would apply
# onto it and then destroy it. If any cluster is live (either region - the
# Route53 zone is shared), every leg skips and the report is green: during
# those weeks the platform is being proven by real usage instead.
#
# NOTE: GitHub disables scheduled workflows after 60 days without repo
# activity; re-enable from the Actions tab if the repo goes quiet.
name: Monthly Platform Rehearsal

on:
  schedule:
    - cron: '0 18 1 * *'   # 18:00 UTC on the 1st = 02:00 SGT on the 2nd
  workflow_dispatch: {}

# Never overlap two rehearsals (e.g. a manual dispatch during the scheduled run)
concurrency: rehearsal

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:
  OIDC_ROLE: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/EKSPlatformDeployerRole

jobs:
  precheck:
    name: Yield to live clusters
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ap-southeast-1

      - name: Check for live clusters
        id: check
        run: |
          PROCEED=true
          for region in ap-southeast-1 us-east-1; do
            for name in cilium-eks-cluster shared-eks-cluster; do
              if aws eks describe-cluster --region "$region" --name "$name" >/dev/null 2>&1; then
                echo "live cluster found: $name in $region - rehearsal yields to it"
                PROCEED=false
              fi
            done
          done
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"

  cilium:
    name: Cilium cluster
    needs: [precheck]
    if: ${{ needs.precheck.outputs.proceed == 'true' }}
    uses: ./.github/workflows/create-cilium-cluster.yml
    with:
      region: ap-southeast-1
      external-dns: true
      cert-manager: true
      argocd: true
      monitoring: true
      logging: true
      tetragon: true
      ebs-csi: true
      kyverno: true
    secrets: inherit

  # !cancelled() so the teardown always runs after its create leg, even a failed
  # one - a broken rehearsal must never leave a cluster running overnight.
  cilium-cleanup:
    name: Cilium teardown
    needs: [precheck, cilium]
    if: ${{ !cancelled() && needs.precheck.outputs.proceed == 'true' }}
    uses: ./.github/workflows/cleanup.yml
    with:
      region: ap-southeast-1
      cluster_type: cilium-cluster
    secrets: inherit

  # Sequential (after the cilium teardown), not parallel: one cluster's cost at
  # a time, and no chance of the two external-dns instances interacting.
  standard:
    name: Standard cluster
    needs: [precheck, cilium-cleanup]
    if: ${{ !cancelled() && needs.precheck.outputs.proceed == 'true' }}
    uses: ./.github/workflows/create-standard-cluster.yml
    with:
      region: ap-southeast-1
      nginx-ingress: true
      external-dns: true
      cert-manager: true
      argocd: true
      monitoring: true
      logging: true
      ebs-csi: true
      kyverno: true
    secrets: inherit

  standard-cleanup:
    name: Standard teardown
    needs: [precheck, standard]
    if: ${{ !cancelled() && needs.precheck.outputs.proceed == 'true' }}
    uses: ./.github/workflows/cleanup.yml
    with:
      region: ap-southeast-1
      cluster_type: standard-cluster
    secrets: inherit

  report:
    name: Rehearsal report
    needs: [precheck, cilium, cilium-cleanup, standard, standard-cleanup]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      PROCEED: ${{ needs.precheck.outputs.proceed }}
      RESULTS: >-
        cilium:${{ needs.cilium.result }}
        cilium-cleanup:${{ needs.cilium-cleanup.result }}
        standard:${{ needs.standard.result }}
        standard-cleanup:${{ needs.standard-cleanup.result }}
    steps:
      - name: All legs green?
        run: |
          if [ "$PROCEED" != "true" ]; then
            echo "Rehearsal skipped: a live cluster is up; this month's proof is real usage."
            exit 0
          fi
          echo "$RESULTS"
          STATUS=0
          for leg in $RESULTS; do
            case "$leg" in
              *:success) ;;
              *) echo "FAILED: $leg"; STATUS=1 ;;
            esac
          done
          exit "$STATUS"
