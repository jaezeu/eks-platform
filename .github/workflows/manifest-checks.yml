# Validates everything Kubernetes-shaped without needing a cluster:
#   - actionlint: the GitHub Actions workflows themselves (incl. shellcheck of run: blocks)
#   - kubeconform: raw manifests (gateway routes, kyverno policies, examples)
#   - validate-addons: every add-on rendered via its own init.sh (helm template)
#     with both the default and gateway-* values, output schema-checked
name: Manifest & Workflow Checks

on:
  push:
    branches: [main]
    paths:
      - 'addons/**'
      - 'applications/**'
      - 'kyverno-policies/**'
      - 'deployment-manifests-examples/**'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'addons/**'
      - 'applications/**'
      - 'kyverno-policies/**'
      - 'deployment-manifests-examples/**'
      - 'scripts/**'
      - '.github/workflows/**'

env:
  # renovate: datasource=github-releases depName=yannh/kubeconform
  KUBECONFORM_VERSION: v0.7.0

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=rhysd/actionlint
      ACTIONLINT_VERSION: 1.7.10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz actionlint
          ./actionlint -color

  kubeconform-manifests:
    name: Validate raw manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install kubeconform
        run: |
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      # -ignore-missing-schemas: brand-new CRDs (e.g. ListenerSet) may not be in
      # the CRDs-catalog yet; they are skipped rather than failing the build.
      - name: Validate manifests
        run: |
          kubeconform \
            -strict -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas \
            -kubernetes-version 1.33.0 \
            -ignore-filename-pattern '.*learner-prometheus.*' \
            kyverno-policies/ \
            deployment-manifests-examples/ \
            addons/cilium/gateway/ \
            addons/argocd/gateway-route.yaml \
            addons/kube-prometheus-stack/gateway-route.yaml

  validate-addons:
    name: Render & validate add-on charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install kubeconform
        run: |
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      # helm and envsubst are preinstalled on ubuntu-latest runners
      - name: Render all add-ons and validate output
        run: ./scripts/validate-addons.sh
