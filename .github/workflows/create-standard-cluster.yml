# This workflow creates the EKS cluster and deploy the addons as specified in the inputs
name: VPC CNI Cluster Creation & Bootstrap

on:
  workflow_dispatch:
    inputs:
      region:
        type: choice
        options:
          - ap-southeast-1
          - us-east-1
        description: "AWS region"
        required: true
        default: ap-southeast-1
      nginx-ingress:
        type: boolean
        description: "Deploy Nginx Ingress Controller?"
        default: false
        required: true
      external-dns:
        type: boolean
        description: "Deploy ExternalDNS?"
        default: false
        required: true
      cert-manager:
        type: boolean
        description: "Deploy CertManager?"
        default: false
        required: true
      argocd:
        type: boolean
        description: "Deploy ArgoCD?"
        default: false
        required: true
      monitoring:
        type: boolean
        description: "Deploy Prometheus and Grafana?"
        default: false
        required: true
      logging:
        type: boolean
        description: "Deploy Loki?"
        default: false
        required: true
      ebs-csi:
        type: boolean
        description: "Deploy EBS CSI Resources?"
        default: false
        required: true
      kyverno:
        type: boolean
        description: "Deploy Kyverno & guardrail policies?"
        default: false
        required: true

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:
  ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
  OIDC_ROLE: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/EKSPlatformDeployerRole
  WORKSPACE: standard-cluster-${{ github.event.inputs.region }}

jobs:
  deploy:
    name: Create Cluster
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.deploy_steps.outputs.CLUSTER_NAME }}
      external_dns_role_arn: ${{ steps.deploy_steps.outputs.EXTERNAL_DNS_ROLE_ARN }}
      loki_s3_role_arn: ${{ steps.deploy_steps.outputs.LOKI_S3_ROLE_ARN }}
      loki_chunks_bucket: ${{ steps.deploy_steps.outputs.LOKI_CHUNKS_BUCKET }}
      loki_ruler_bucket: ${{ steps.deploy_steps.outputs.LOKI_RULER_BUCKET }}
      ebs_csi_role_arn: ${{ steps.deploy_steps.outputs.EBS_CSI_ROLE_ARN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Workspace Setup
        run: |
          terraform workspace select ${{ env.WORKSPACE }} || terraform workspace new ${{ env.WORKSPACE }}
          terraform workspace list
        working-directory: ./terraform/eks-cluster

      - name: Deploy Cluster and Extract Outputs
        id: deploy_steps
        run: |
          terraform plan -out=cluster.out
          terraform apply -auto-approve cluster.out

          {
            echo "CLUSTER_NAME=$(terraform output -raw cluster_name)"
            echo "EXTERNAL_DNS_ROLE_ARN=$(terraform output -json external_dns_role_arn | jq -r '.[0]')"
            echo "LOKI_S3_ROLE_ARN=$(terraform output -json loki_s3_role_arn | jq -r '.[0]')"
            echo "LOKI_CHUNKS_BUCKET=$(terraform output -json loki_chunks_bucket_name | jq -r '.[0]')"
            echo "LOKI_RULER_BUCKET=$(terraform output -json loki_ruler_bucket_name | jq -r '.[0]')"
            echo "EBS_CSI_ROLE_ARN=$(terraform output -json ebs_csi_driver_role_arn | jq -r '.[0]')"
          } >> "$GITHUB_OUTPUT"
        working-directory: ./terraform/eks-cluster

      # Fail the deploy job (so bootstrap never runs on a broken cluster) unless every node has reached Ready.
      - name: Smoke test to check if nodes are Ready
        run: |
          aws eks update-kubeconfig --name ${{ steps.deploy_steps.outputs.CLUSTER_NAME }}
          kubectl wait --for=condition=Ready nodes --all --timeout=60s

  bootstrap:
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ needs.deploy.outputs.cluster_name }}

      - name: Deploy Nginx Ingress Controller
        if: ${{ github.event.inputs.nginx-ingress == 'true' }}
        working-directory: addons/nginx-ingress
        run: ./init.sh

      - name: Deploy ExternalDNS for Route53
        if: ${{ github.event.inputs.external-dns == 'true' }}
        working-directory: addons/r53-externaldns
        env:
          REGION: ${{ github.event.inputs.region }}
          EXTERNAL_DNS_ROLE_ARN: ${{ needs.deploy.outputs.external_dns_role_arn }}
          CLUSTER_NAME: ${{ needs.deploy.outputs.cluster_name }}
        run: |
          envsubst < values.yaml > updated-values.yaml
          mv updated-values.yaml values.yaml
          ./init.sh

      - name: Deploy Cert Manager
        if: ${{ github.event.inputs.cert-manager == 'true' }}
        working-directory: addons/cert-manager
        env:
          EMAIL: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          ./init.sh
          envsubst < cluster-issuer.yaml | kubectl apply -f -

      - name: Deploy ArgoCD
        if: ${{ github.event.inputs.argocd == 'true' }}
        working-directory: addons/argocd
        run: ./init.sh

      - name: Deploy Prometheus and Grafana
        if: ${{ github.event.inputs.monitoring == 'true' }}
        working-directory: addons/kube-prometheus-stack
        run: ./init.sh

      - name: Deploy Loki
        if: ${{ github.event.inputs.logging == 'true' }}
        working-directory: addons/loki
        env:
          REGION: ${{ github.event.inputs.region }}
          LOKI_S3_ROLE_ARN: ${{ needs.deploy.outputs.loki_s3_role_arn }}
          LOKI_CHUNKS_BUCKET: ${{ needs.deploy.outputs.loki_chunks_bucket }}
          LOKI_RULER_BUCKET: ${{ needs.deploy.outputs.loki_ruler_bucket }}
        run: |
          # shellcheck disable=SC2016  # literal ${VAR} names are envsubst syntax, not shell
          envsubst '${REGION} ${LOKI_S3_ROLE_ARN} ${LOKI_CHUNKS_BUCKET} ${LOKI_RULER_BUCKET}' < loki-values.yaml > updated-values.yaml
          mv updated-values.yaml loki-values.yaml
          ./init.sh

      - name: Deploy EBS CSI Driver Resources
        if: ${{ github.event.inputs.ebs-csi == 'true' }}
        working-directory: addons/ebs-csi-driver
        env:
          EBS_CSI_ROLE_ARN: ${{ needs.deploy.outputs.ebs_csi_role_arn }}
        run: |
          # shellcheck disable=SC2016  # literal ${VAR} names are envsubst syntax, not shell
          envsubst '${EBS_CSI_ROLE_ARN}' < values.yaml > updated-values.yaml
          mv updated-values.yaml values.yaml
          ./init.sh

      # Kyverno must be last: its policies enforce namespace naming and block
      # deletions in protected namespaces, which would interfere with the
      # add-on installs above.
      - name: Deploy Kyverno & Guardrail Policies
        if: ${{ github.event.inputs.kyverno == 'true' }}
        working-directory: addons/kyverno
        run: ./init.sh

  verify:
    name: Verify Platform
    runs-on: ubuntu-latest
    needs: [deploy, bootstrap]
    timeout-minutes: 30
    env:
      NGINX_INGRESS: ${{ inputs.nginx-ingress }}
      EXTERNAL_DNS: ${{ inputs.external-dns }}
      CERT_MANAGER: ${{ inputs.cert-manager }}
      ARGOCD: ${{ inputs.argocd }}
      MONITORING: ${{ inputs.monitoring }}
      LOGGING: ${{ inputs.logging }}
      KYVERNO: ${{ inputs.kyverno }}

    steps:
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ needs.deploy.outputs.cluster_name }}

      - name: Platform workloads healthy
        run: |
          NAMESPACES="kube-system"
          [ "$NGINX_INGRESS" = "true" ] && NAMESPACES="$NAMESPACES ingress-nginx"
          [ "$EXTERNAL_DNS" = "true" ]  && NAMESPACES="$NAMESPACES external-dns"
          [ "$CERT_MANAGER" = "true" ]  && NAMESPACES="$NAMESPACES cert-manager"
          [ "$ARGOCD" = "true" ]        && NAMESPACES="$NAMESPACES argocd"
          [ "$MONITORING" = "true" ]    && NAMESPACES="$NAMESPACES monitoring"
          [ "$LOGGING" = "true" ]       && NAMESPACES="$NAMESPACES loki"
          [ "$KYVERNO" = "true" ]       && NAMESPACES="$NAMESPACES kyverno"
          for ns in $NAMESPACES; do
            echo "--- $ns"
            RESOURCES=$(kubectl get deploy,statefulset,daemonset -n "$ns" -o name)
            [ -n "$RESOURCES" ] || { echo "no workloads found in $ns"; exit 1; }
            for r in $RESOURCES; do
              kubectl rollout status "$r" -n "$ns" --timeout=3m
            done
          done

      - name: Kyverno guardrail policies ready
        if: ${{ inputs.kyverno }}
        run: kubectl wait --for=condition=Ready clusterpolicy --all --timeout=3m

      - name: Ingress load balancer provisioned
        if: ${{ inputs.nginx-ingress }}
        run: |
          kubectl wait -n ingress-nginx svc -l app.kubernetes.io/component=controller \
            --for=jsonpath='{.status.loadBalancer.ingress[0].hostname}' --timeout=5m

      - name: Platform certificates issued
        if: ${{ inputs.nginx-ingress && inputs.cert-manager && inputs.external-dns && (inputs.argocd || inputs.monitoring) }}
        run: |
          NAMESPACES=""
          [ "$ARGOCD" = "true" ]     && NAMESPACES="$NAMESPACES argocd"
          [ "$MONITORING" = "true" ] && NAMESPACES="$NAMESPACES monitoring"
          for ns in $NAMESPACES; do
            kubectl wait --for=condition=Ready certificate --all -n "$ns" --timeout=10m
          done

      - name: Platform UIs reachable over HTTPS
        if: ${{ inputs.nginx-ingress && inputs.cert-manager && inputs.external-dns && (inputs.argocd || inputs.monitoring) }}
        run: |
          URLS=""
          [ "$ARGOCD" = "true" ]     && URLS="$URLS https://admin-argocd.sctp-sandbox.com"
          [ "$MONITORING" = "true" ] && URLS="$URLS https://admin-prom.sctp-sandbox.com https://admin-grafana.sctp-sandbox.com"
          for url in $URLS; do
            curl -sSfL -o /dev/null --connect-timeout 15 --retry 10 --retry-delay 15 --retry-all-errors "$url"
            echo "OK  $url"
          done

      - name: Diagnostics on failure
        if: failure() || cancelled()
        run: |
          kubectl get pods -A || true
          kubectl get ingress -A || true
          kubectl describe certificate -A || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 50 || true
