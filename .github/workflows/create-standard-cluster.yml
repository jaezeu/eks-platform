# This workflow creates the EKS cluster and deploy the addons as specified in the inputs
name: VPC CNI Cluster Creation & Bootstrap

on:
  workflow_dispatch:
    inputs:
      region:
        type: choice
        options:
          - ap-southeast-1
          - us-east-1
        description: "AWS region"
        required: true
        default: ap-southeast-1
      nginx-ingress:
        type: boolean
        description: "Deploy Nginx Ingress Controller?"
        default: false
        required: true
      external-dns:
        type: boolean
        description: "Deploy ExternalDNS?"
        default: false
        required: true
      cert-manager:
        type: boolean
        description: "Deploy CertManager?"
        default: false
        required: true
      argocd:
        type: boolean
        description: "Deploy ArgoCD?"
        default: false
        required: true
      monitoring:
        type: boolean
        description: "Deploy Prometheus and Grafana?"
        default: false
        required: true
      logging:
        type: boolean
        description: "Deploy Loki?"
        default: false
        required: true
      ebs-csi:
        type: boolean
        description: "Deploy EBS CSI Resources?"
        default: false
        required: true

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:
  ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
  OIDC_ROLE: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/shared-eks-cluster-deployer-role
  CLUSTER_TYPE: standard-cluster # Setting it to this value since its a shared state bucket. Just for ease of identification if anyone else goes in to see.

jobs:
  deploy:
    name: Create Cluster
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.deploy_steps.outputs.CLUSTER_NAME }}
      external_dns_role_arn: ${{ steps.deploy_steps.outputs.EXTERNAL_DNS_ROLE_ARN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Workspace Setup
        run: |
          terraform workspace select ${{ env.CLUSTER_TYPE }} || terraform workspace new ${{ env.CLUSTER_TYPE }}
          terraform workspace list
        working-directory: ./terraform/eks-cluster

      - name: Deploy Cluster without Node Groups
        id: deploy_steps
        run: |
          echo "Creating cluster with no node group"
          terraform plan -var-file=vars/standard-wo-nodegroup.tfvars -out=standard-cluster-wo-nodegroups.out
          terraform apply -auto-approve standard-cluster-wo-nodegroups.out

          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "EXTERNAL_DNS_ROLE_ARN=$(terraform output -json external_dns_role_arn | jq -r '.[0]')" >> $GITHUB_OUTPUT
        working-directory: ./terraform/eks-cluster

      - name: Deploy Cluster with Node Groups
        id: deploy_nodes
        run: |
          terraform plan -out standard-cluster-with-nodegroups.out
          terraform apply -auto-approve standard-cluster-with-nodegroups.out
        working-directory: ./terraform/eks-cluster

  bootstrap:
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ needs.deploy.outputs.cluster_name }}

      - name: Deploy Nginx Ingress Controller
        if: ${{ github.event.inputs.nginx-ingress == 'true' }}
        run: |
          cd addons/nginx-ingress
          chmod +x init.sh
          ./init.sh

      - name: Deploy ExternalDNS for Route53
        if: ${{ github.event.inputs.external-dns == 'true' }}
        env:
          REGION: ${{ github.event.inputs.region }}
          EXTERNAL_DNS_ROLE_ARN: ${{ needs.deploy.outputs.external_dns_role_arn }}
          CLUSTER_NAME: ${{ needs.deploy.outputs.cluster_name }}
        run: |
          cd addons/r53-externaldns
          envsubst < values.yaml > updated-values.yaml
          mv updated-values.yaml values.yaml
          chmod +x init.sh
          ./init.sh

      - name: Deploy Cert Manager
        if: ${{ github.event.inputs.cert-manager == 'true' }}
        env:
          EMAIL: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          cd addons/cert-manager
          chmod +x init.sh
          ./init.sh
          
          envsubst < cluster-issuer.yaml | kubectl apply -f -

      - name: Deploy ArgoCD
        if: ${{ github.event.inputs.argocd == 'true' }}
        run: |
          cd addons/argocd
          chmod +x init.sh
          ./init.sh

      - name: Deploy Prometheus and Grafana
        if: ${{ github.event.inputs.monitoring == 'true' }}
        run: |
          cd addons/kube-prometheus-stack
          chmod +x init.sh
          ./init.sh

      - name: Deploy Loki
        if: ${{ github.event.inputs.logging == 'true' }}
        run: |
          cd addons/loki
          chmod +x init.sh
          ./init.sh

      - name: Deploy EBS CSI Driver Resources
        if: ${{ github.event.inputs.ebs-csi == 'true' }}
        run: |
          cd addons/ebs-csi-driver
          kubectl apply -f .

