# This workflow cleans up all helm charts deployed within the EKS cluster and destroys the cluster once done.
# continue-on-error: true is set on all steps so the workflow keeps going if another cleanup run already removed the cluster; terraform destroy still runs at the end to sweep up rogue resources.
name: Cleanup
run-name: Cleanup of ${{ github.event.inputs.cluster_type }} in ${{ github.event.inputs.region }}

on:
  workflow_dispatch:
    inputs:
      region:
        type: choice
        options:
          - ap-southeast-1
          - us-east-1
        description: "AWS region"
        required: true
        default: ap-southeast-1
      cluster_type:
        type: choice
        options:
          - cilium-cluster
          - standard-cluster
        description: "Cluster Networking Type"
        required: true
        default: standard-cluster

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:            
  ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
  OIDC_ROLE: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/shared-eks-cluster-deployer-role
          
jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Workspace Select
        run: |
          terraform workspace select ${{ github.event.inputs.cluster_type }}-${{ github.event.inputs.region }}
        working-directory: ./terraform/eks-cluster

      - name: Export terraform outputs
        id: tfout
        continue-on-error: true
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
        working-directory: ./terraform/eks-cluster

      - name: Update kubeconfig
        continue-on-error: true
        run: aws eks update-kubeconfig --name ${{ steps.tfout.outputs.CLUSTER_NAME }}

      # Must run before any uninstalls: the Kyverno guardrail policies block
      # deletions in protected namespaces, which would deny the steps below.
      - name: Remove Kyverno guardrail policies
        continue-on-error: true
        run: |
          kubectl delete clusterpolicies --all --ignore-not-found=true || true

      - name: Uninstall Kyverno
        continue-on-error: true
        run: |
          kyverno_namespace=$(helm list -A -o json | jq -r '.[] | select(.name == "kyverno") | .namespace')
          if [ -n "$kyverno_namespace" ]; then
            helm uninstall kyverno -n "$kyverno_namespace" --no-hooks || true
          fi

          kubectl delete validatingwebhookconfigurations,mutatingwebhookconfigurations \
            -l webhook.kyverno.io/managed-by=kyverno --ignore-not-found=true || true

      - name: Uninstall all Helm releases except external-dns and cilium
        continue-on-error: true
        run: |
          helm list -A -o json | jq -r '.[] | select(.name != "external-dns" and .name != "cilium" and .name != "kyverno") | "\(.name) \(.namespace)"' | while read -r release ns; do
            echo "Uninstalling Helm release: $release in namespace: $ns"
            helm uninstall "$release" -n "$ns" || true
          done

      # HTTPRoutes, ListenerSets and the shared Gateway are kubectl-applied (not
      # Helm releases), so the uninstall step above leaves them behind and
      # external-dns never sees their hosts removed. Delete them while
      # external-dns is still running so it can clean up the Route53 records.
      # No-ops on the standard cluster where these CRDs don't exist.
      - name: Delete Gateway API resources so external-dns removes their records
        continue-on-error: true
        run: |
          kubectl delete httproutes.gateway.networking.k8s.io --all -A --ignore-not-found=true || true
          kubectl delete listenersets.gateway.networking.k8s.io --all -A --ignore-not-found=true || true
          kubectl delete gateways.gateway.networking.k8s.io --all -A --ignore-not-found=true || true

      - name: Wait for external-dns to sync DNS removals
        run: sleep 60

      - name: Uninstall external-dns Helm release
        continue-on-error: true
        run: |
          external_dns_namespace=$(helm list -A -o json | jq -r '.[] | select(.name == "external-dns") | "\(.namespace)"')
          helm uninstall external-dns -n "$external_dns_namespace" || true
          
      - name: Delete all remaining K8s resources
        continue-on-error: true
        run: |
          kubectl delete all --all -A || true
          kubectl delete pvc --all -A || true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./terraform/eks-cluster