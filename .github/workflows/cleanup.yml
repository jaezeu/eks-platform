# This workflow cleans up all helm charts deployed within the EKS cluster and destroys the cluster once done.
# continue-on-error: true has been set for all steps to ensure that the workflow does not fail in the event of other cleanup jobs removing the cluster. This is so that terraform destroy can still be run to remove rouge resources.
name: Cleanup
run-name: Cleanup of ${{ github.event.inputs.cluster_type }} in ${{ github.event.inputs.region }}

on:
  workflow_dispatch:
    inputs:
      region:
        type: choice
        options:
          - ap-southeast-1
          - us-east-1
        description: "AWS region"
        required: true
        default: ap-southeast-1
      cluster_type:
        type: choice
        options:
          - cilium-cluster
          - standard-cluster
        description: "Cluster Networking Type"
        required: true
        default: standard-cluster

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:            
  OIDC_ROLE: arn:aws:iam::255945442255:role/shared-eks-cluster-deployer-role
          
jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Workspace Select
        run: |
          terraform workspace select ${{ github.event.inputs.cluster_type }}
        working-directory: ./terraform/eks-cluster

      - name: Export terraform outputs
        id: tfout
        continue-on-error: true
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
        working-directory: ./terraform/eks-cluster

      - name: Update kubeconfig
        continue-on-error: true
        run: aws eks update-kubeconfig --name ${{ steps.tfout.outputs.CLUSTER_NAME }}

      - name: Uninstall all Helm releases except external-dns
        continue-on-error: true
        run: |
          helm list -A -o json | jq -r '.[] | select(.name != "external-dns") | "\(.name) \(.namespace)"' | while read release ns; do
            echo "Uninstalling Helm release: $release in namespace: $ns"
            helm uninstall "$release" -n "$ns" || true
          done

      - name: Wait for external-dns to sync DNS removals
        run: sleep 60

      - name: Uninstall external-dns Helm release
        continue-on-error: true
        run: |
          external_dns_namespace=$(helm list -A -o json | jq -r '.[] | select(.name == "external-dns") | "\(.namespace)"')
          echo "Uninstalling external-dns from namespace: $external_dns_namespace"
          helm uninstall external-dns -n "$external_dns_namespace" || true
          
      - name: Delete all remaining K8s resources
        continue-on-error: true
        run: |
          kubectl delete all --all -A || true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./terraform/eks-cluster


