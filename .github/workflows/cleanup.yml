# This workflow cleans up all helm charts deployed within the EKS cluster and destroys the cluster once done.
# continue-on-error: true is set on the k8s/helm steps so the workflow keeps going if another cleanup run already removed the cluster; terraform destroy still runs at the end to sweep up rogue resources.
name: Cleanup
run-name: Cleanup of ${{ inputs.cluster_type }} in ${{ inputs.region }}

on:
  workflow_dispatch:
    inputs:
      region:
        type: choice
        options:
          - ap-southeast-1
          - us-east-1
        description: "AWS region"
        required: true
        default: ap-southeast-1
      cluster_type:
        type: choice
        options:
          - cilium-cluster
          - standard-cluster
        description: "Cluster Networking Type"
        required: true
        default: standard-cluster
  # Mirrors the dispatch inputs so the rehearsal workflow can call this workflow.
  workflow_call:
    inputs:
      region:
        type: string
        default: ap-southeast-1
      cluster_type:
        type: string
        default: standard-cluster

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:
  ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
  OIDC_ROLE: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/EKSPlatformDeployerRole
  # renovate: datasource=github-releases depName=hashicorp/terraform
  TERRAFORM_VERSION: 1.15.8

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Workspace Select
        run: |
          terraform workspace select ${{ inputs.cluster_type }}-${{ inputs.region }}
        working-directory: ./terraform/eks-cluster

      - name: Export terraform outputs
        id: tfout
        continue-on-error: true
        run: |
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
        working-directory: ./terraform/eks-cluster

      - name: Update kubeconfig
        continue-on-error: true
        run: aws eks update-kubeconfig --name ${{ steps.tfout.outputs.CLUSTER_NAME }}

      # Must run before any uninstalls: the Kyverno guardrail policies block
      # deletions in protected namespaces, which would deny the steps below.
      - name: Remove Kyverno guardrail policies
        continue-on-error: true
        run: |
          kubectl delete clusterpolicies --all --ignore-not-found=true || true

      - name: Uninstall Kyverno
        continue-on-error: true
        run: |
          kyverno_namespace=$(helm list -A -o json | jq -r '.[] | select(.name == "kyverno") | .namespace')
          if [ -n "$kyverno_namespace" ]; then
            helm uninstall kyverno -n "$kyverno_namespace" --no-hooks || true
          fi

          kubectl delete validatingwebhookconfigurations,mutatingwebhookconfigurations \
            -l webhook.kyverno.io/managed-by=kyverno --ignore-not-found=true || true

      # The EBS CSI driver stays installed until the PVCs below are deleted,
      # otherwise the EBS volumes behind them are orphaned; it dies with the
      # cluster so it never needs uninstalling.
      - name: Uninstall all Helm releases except external-dns, cilium and the CSI driver
        continue-on-error: true
        run: |
          helm list -A -o json | jq -r '.[] | select(.name != "external-dns" and .name != "cilium" and .name != "kyverno" and .name != "aws-ebs-csi-driver") | "\(.name) \(.namespace)"' | while read -r release ns; do
            echo "Uninstalling Helm release: $release in namespace: $ns"
            helm uninstall "$release" -n "$ns" || true
          done

      # HTTPRoutes, ListenerSets, the shared Gateway and learner Ingresses are
      # not Helm releases (and `kubectl delete all` doesn't cover Ingress), so
      # the uninstall step above leaves them behind and external-dns never sees
      # their hosts removed. Delete them while external-dns is still running so
      # it can clean up the Route53 records 
      - name: Delete Ingress & Gateway API resources so external-dns removes their records
        continue-on-error: true
        run: |
          kubectl delete ingress --all -A --ignore-not-found=true || true
          kubectl delete httproutes.gateway.networking.k8s.io --all -A --ignore-not-found=true || true
          kubectl delete listenersets.gateway.networking.k8s.io --all -A --ignore-not-found=true || true
          kubectl delete gateways.gateway.networking.k8s.io --all -A --ignore-not-found=true || true

      # Poll instead of a blind sleep; records the poll gives up on are deleted
      # by the orphan sweep below. Scoped by OWNERSHIP, not by hostname: this is
      # a shared cluster, so learners create records for arbitrary hostnames.
      # external-dns marks every record it manages with a TXT registry record
      # containing external-dns/owner=<txtOwnerId> (= this cluster's name), so
      # waiting on those covers learner records too and never watches records
      # owned by another cluster.
      - name: Wait for external-dns to remove this cluster's DNS records
        if: steps.tfout.outputs.CLUSTER_NAME != ''
        continue-on-error: true
        env:
          CLUSTER_NAME: ${{ steps.tfout.outputs.CLUSTER_NAME }}
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones-by-name --dns-name sctp-sandbox.com --query 'HostedZones[0].Id' --output text)
          for _ in $(seq 1 18); do
            LEFT=$(aws route53 list-resource-record-sets --hosted-zone-id "$ZONE_ID" --output json \
              | jq -r --arg owner "external-dns/owner=$CLUSTER_NAME" \
                '.ResourceRecordSets[] | select(.Type=="TXT" and (.ResourceRecords // [] | any(.Value | contains($owner)))) | .Name')
            if [ -z "$LEFT" ]; then
              echo "external-dns removed all records owned by $CLUSTER_NAME"
              exit 0
            fi
            echo "still owned by $CLUSTER_NAME: $LEFT"
            sleep 10
          done
          echo "records still owned after 3m; the orphan sweep will remove them"

      - name: Uninstall external-dns Helm release
        continue-on-error: true
        run: |
          external_dns_namespace=$(helm list -A -o json | jq -r '.[] | select(.name == "external-dns") | "\(.namespace)"')
          helm uninstall external-dns -n "$external_dns_namespace" || true

      - name: Delete all remaining K8s resources
        continue-on-error: true
        run: |
          kubectl delete all --all -A || true
          kubectl delete pvc --all -A || true
          kubectl wait --for=delete pv --all --timeout=3m || true

      - name: Sweep orphaned load balancers, target groups & DNS records
        if: steps.tfout.outputs.CLUSTER_NAME != ''
        continue-on-error: true
        env:
          CLUSTER_NAME: ${{ steps.tfout.outputs.CLUSTER_NAME }}
        run: |
          # One tagging-API call finds every ELB resource (ALB/NLB, classic,
          # target group) tagged to this cluster.
          ARNS=$(aws resourcegroupstaggingapi get-resources \
            --tag-filters "Key=kubernetes.io/cluster/${CLUSTER_NAME}" \
            --resource-type-filters elasticloadbalancing \
            --query 'ResourceTagMappingList[].ResourceARN' --output text)
          for arn in $ARNS; do
            echo "deleting orphaned: $arn"
            case "$arn" in
              *:loadbalancer/app/*|*:loadbalancer/net/*) aws elbv2 delete-load-balancer --load-balancer-arn "$arn" || true ;;
              *:loadbalancer/*) aws elb delete-load-balancer --load-balancer-name "${arn##*/}" || true ;;
              *:targetgroup/*) aws elbv2 delete-target-group --target-group-arn "$arn" || true ;;
            esac
          done

          # DNS: the TXT registry rows this cluster's external-dns owns (names
          # may prefix the record type: a-, aaaa-, cname-, txt-) plus the
          # records they mark, deleted in one atomic change batch.
          ZONE_ID=$(aws route53 list-hosted-zones-by-name --dns-name sctp-sandbox.com --query 'HostedZones[0].Id' --output text)
          BATCH=$(aws route53 list-resource-record-sets --hosted-zone-id "$ZONE_ID" --output json \
            | jq -c --arg owner "external-dns/owner=$CLUSTER_NAME" '
                [.ResourceRecordSets[] | select(.Type=="TXT" and (.ResourceRecords // [] | any(.Value | contains($owner)))) | .Name] as $txt
                | ($txt + ($txt | map(sub("^(a-|aaaa-|cname-|txt-)"; ""))) | unique) as $names
                | {Changes: [.ResourceRecordSets[] | select(.Name as $n | $names | index($n)) | {Action: "DELETE", ResourceRecordSet: .}]}')
          if [ "$(echo "$BATCH" | jq '.Changes | length')" -gt 0 ]; then
            echo "deleting orphaned DNS records: $(echo "$BATCH" | jq -r '[.Changes[].ResourceRecordSet.Name] | unique | join(" ")')"
            aws route53 change-resource-record-sets --hosted-zone-id "$ZONE_ID" --change-batch "$BATCH" || true
          fi

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./terraform/eks-cluster
