# This workflow creates the EKS cluster and deploy the addons as specified in the inputs
name: Cilium CNI Cluster Creation & Bootstrap

on:
  workflow_dispatch:
    inputs:
      region:
        type: choice
        options:
          - ap-southeast-1
          - us-east-1
        description: "AWS region"
        required: true
        default: ap-southeast-1
      external-dns:
        type: boolean
        description: "Deploy ExternalDNS?"
        default: false
        required: true
      cert-manager:
        type: boolean
        description: "Deploy CertManager?"
        default: false
        required: true
      argocd:
        type: boolean
        description: "Deploy ArgoCD?"
        default: false
        required: true
      monitoring:
        type: boolean
        description: "Deploy Prometheus and Grafana?"
        default: false
        required: true
      logging:
        type: boolean
        description: "Deploy Loki?"
        default: false
        required: true
      tetragon:
        type: boolean
        description: "Deploy Tetragon?"
        default: false
        required: true
      ebs-csi:
        type: boolean
        description: "Deploy EBS CSI Resources?"
        default: false
        required: true
      kyverno:
        type: boolean
        description: "Deploy Kyverno & guardrail policies?"
        default: false
        required: true

permissions:
  id-token: write       # Required for OIDC
  contents: read        # To read repo content

env:
  ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
  OIDC_ROLE: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/shared-eks-cluster-deployer-role
  WORKSPACE: cilium-cluster-${{ github.event.inputs.region }}

jobs:
  deploy:
    name: Create Cluster
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.deploy_steps.outputs.CLUSTER_NAME }}
      external_dns_role_arn: ${{ steps.deploy_steps.outputs.EXTERNAL_DNS_ROLE_ARN }}
      loki_s3_role_arn: ${{ steps.deploy_steps.outputs.LOKI_S3_ROLE_ARN }}
      loki_chunks_bucket: ${{ steps.deploy_steps.outputs.LOKI_CHUNKS_BUCKET }}
      loki_ruler_bucket: ${{ steps.deploy_steps.outputs.LOKI_RULER_BUCKET }}
      ebs_csi_role_arn: ${{ steps.deploy_steps.outputs.EBS_CSI_ROLE_ARN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
        
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/eks-cluster

      - name: Terraform Workspace Setup
        run: |
          terraform workspace select ${{ env.WORKSPACE }} || terraform workspace new ${{ env.WORKSPACE }}
          terraform workspace list
        working-directory: ./terraform/eks-cluster

      - name: Deploy Cluster
        id: deploy_steps
        run: |
          echo "Creating cluster with no node group"
          terraform plan -var-file=vars/cilium-wo-nodegroup.tfvars -out=cilium-cluster-wo-nodegroups.out
          terraform apply -auto-approve cilium-cluster-wo-nodegroups.out

          export CLUSTER_NAME=$(terraform output -raw cluster_name)
          export CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)

          aws eks update-kubeconfig --name "$CLUSTER_NAME"

          echo "Adding Gateway API v1.5.1 standard-channel CRDs (per Cilium docs; TLSRoute and ListenerSet are standard as of v1.5)"
          kubectl apply \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_gatewayclasses.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_gateways.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_referencegrants.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_grpcroutes.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_backendtlspolicies.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_listenersets.yaml \
            -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.5.1/config/crd/standard/gateway.networking.k8s.io_tlsroutes.yaml

          echo "Installing Cilium CNI"
          pushd ../../addons/cilium
          envsubst '${CLUSTER_ENDPOINT}' < values.yaml > updated-values.yaml
          mv updated-values.yaml values.yaml
          ./init.sh
          popd

          echo "Creating cluster with node group"
          terraform plan -var-file=vars/cilium-with-nodegroup.tfvars -out cilium-cluster-with-nodegroups.out
          terraform apply -auto-approve cilium-cluster-with-nodegroups.out

          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          echo "EXTERNAL_DNS_ROLE_ARN=$(terraform output -json external_dns_role_arn | jq -r '.[0]')" >> $GITHUB_OUTPUT
          echo "LOKI_S3_ROLE_ARN=$(terraform output -json loki_s3_role_arn | jq -r '.[0]')" >> $GITHUB_OUTPUT
          echo "LOKI_CHUNKS_BUCKET=$(terraform output -json loki_chunks_bucket_name | jq -r '.[0]')" >> $GITHUB_OUTPUT
          echo "LOKI_RULER_BUCKET=$(terraform output -json loki_ruler_bucket_name | jq -r '.[0]')" >> $GITHUB_OUTPUT
          echo "EBS_CSI_ROLE_ARN=$(terraform output -json ebs_csi_driver_role_arn | jq -r '.[0]')" >> $GITHUB_OUTPUT
        working-directory: ./terraform/eks-cluster

      # Install the cilium CLI on the runner (amd64 — runs on the runner, not the ARM nodes).
      - name: Install Cilium CLI
        env:
          # renovate: datasource=github-releases depName=cilium/cilium-cli
          CILIUM_CLI_VERSION: v0.18.7
        run: |
          curl -L --fail --remote-name-all https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz{,.sha256sum}
          sha256sum --check cilium-linux-amd64.tar.gz.sha256sum
          sudo tar xzvfC cilium-linux-amd64.tar.gz /usr/local/bin
          rm cilium-linux-amd64.tar.gz{,.sha256sum}

      # Fail the deploy job (so bootstrap never runs on a broken cluster) unless
      # Cilium is healthy and every node has reached Ready.
      - name: Smoke test - Cilium healthy & nodes Ready
        run: |
          aws eks update-kubeconfig --name ${{ steps.deploy_steps.outputs.CLUSTER_NAME }}
          cilium status --wait
          kubectl wait --for=condition=Ready nodes --all --timeout=60s

  bootstrap:
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE }}
          aws-region: ${{ inputs.region }}
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ needs.deploy.outputs.cluster_name }}

      # Shared Cilium Gateway (Gateway API). The GatewayClass "cilium" and the
      # Gateway API CRDs are created in the deploy job; this creates the single
      # shared Gateway that per-add-on ListenerSets + HTTPRoutes attach to.
      - name: Deploy Cilium Shared Gateway
        working-directory: addons/cilium/gateway
        run: |
          kubectl apply -f namespace.yml
          kubectl apply -f shared-gateway.yml
          kubectl apply -f hubble-ui-route.yaml

      - name: Deploy ExternalDNS for Route53
        if: ${{ github.event.inputs.external-dns == 'true' }}
        working-directory: addons/r53-externaldns
        env:
          REGION: ${{ github.event.inputs.region }}
          EXTERNAL_DNS_ROLE_ARN: ${{ needs.deploy.outputs.external_dns_role_arn }}
          CLUSTER_NAME: ${{ needs.deploy.outputs.cluster_name }}
        run: |
          envsubst < gateway-values.yaml > updated-values.yaml
          mv updated-values.yaml gateway-values.yaml
          ./init.sh gateway-values.yaml

      - name: Deploy Cert Manager
        if: ${{ github.event.inputs.cert-manager == 'true' }}
        working-directory: addons/cert-manager
        env:
          EMAIL: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          ./init.sh gateway-values.yaml gateway-cluster-issuer.yaml
          envsubst < gateway-cluster-issuer.yaml | kubectl apply -f -

      - name: Deploy ArgoCD
        if: ${{ github.event.inputs.argocd == 'true' }}
        working-directory: addons/argocd
        run: |
          ./init.sh gateway-values.yaml
          kubectl apply -f gateway-route.yaml

      - name: Deploy Prometheus and Grafana
        if: ${{ github.event.inputs.monitoring == 'true' }}
        working-directory: addons/kube-prometheus-stack
        run: |
          ./init.sh gateway-values.yaml
          kubectl apply -f gateway-route.yaml

      - name: Deploy Loki
        if: ${{ github.event.inputs.logging == 'true' }}
        working-directory: addons/loki
        env:
          REGION: ${{ github.event.inputs.region }}
          LOKI_S3_ROLE_ARN: ${{ needs.deploy.outputs.loki_s3_role_arn }}
          LOKI_CHUNKS_BUCKET: ${{ needs.deploy.outputs.loki_chunks_bucket }}
          LOKI_RULER_BUCKET: ${{ needs.deploy.outputs.loki_ruler_bucket }}
        run: |
          envsubst '${REGION} ${LOKI_S3_ROLE_ARN} ${LOKI_CHUNKS_BUCKET} ${LOKI_RULER_BUCKET}' < loki-values.yaml > updated-values.yaml
          mv updated-values.yaml loki-values.yaml
          ./init.sh

      - name: Deploy Tetragon
        if: ${{ github.event.inputs.tetragon == 'true' }}
        working-directory: addons/cilium/tetragon
        run: ./init.sh

      - name: Deploy EBS CSI Driver Resources
        if: ${{ github.event.inputs.ebs-csi == 'true' }}
        working-directory: addons/ebs-csi-driver
        env:
          EBS_CSI_ROLE_ARN: ${{ needs.deploy.outputs.ebs_csi_role_arn }}
        run: |
          envsubst '${EBS_CSI_ROLE_ARN}' < values.yaml > updated-values.yaml
          mv updated-values.yaml values.yaml
          ./init.sh

      # Kyverno must be last: its policies enforce namespace naming and block
      # deletions in protected namespaces, which would interfere with the
      # add-on installs above.
      - name: Deploy Kyverno & Guardrail Policies
        if: ${{ github.event.inputs.kyverno == 'true' }}
        working-directory: addons/kyverno
        run: ./init.sh
