loki:
   schemaConfig:
     configs:
       - from: "2024-04-01"
         store: tsdb
         object_store: s3
         schema: v13
         index:
           prefix: loki_index_
           period: 24h
   auth_enabled: false
   storage_config:
     aws:
       region: ${REGION} # substituted by the workflow (or envsubst manually) from the cluster region
       bucketnames: ${LOKI_CHUNKS_BUCKET} # substituted from the Terraform output loki_chunks_bucket_name
       s3forcepathstyle: false
   ingester:
       chunk_encoding: snappy
   pattern_ingester:
       enabled: true
   limits_config:
     allow_structured_metadata: true
     volume_enabled: true
     retention_period: 24h # keep logs for 1 day (sandbox clusters are short-lived)
   compactor:
     retention_enabled: true 
     delete_request_store: s3
   ruler:
    enable_api: true
    storage:
      type: s3
      s3:
        region: ${REGION} # substituted by the workflow (or envsubst manually) from the cluster region
        bucketnames: ${LOKI_RULER_BUCKET} # substituted from the Terraform output loki_ruler_bucket_name
        s3forcepathstyle: false
      alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring:9093 # The URL of the Alertmanager to send alerts (Prometheus, Mimir, etc.)

   querier:
      max_concurrent: 4

   storage:
      type: s3
      bucketNames:
        chunks: "${LOKI_CHUNKS_BUCKET}" # substituted from the Terraform output loki_chunks_bucket_name
        ruler: "${LOKI_RULER_BUCKET}" # substituted from the Terraform output loki_ruler_bucket_name
        # admin: "<Insert s3 bucket name>" # Your actual S3 bucket name (loki-aws-dev-admin) - GEL customers only
      s3:
        region: ${REGION} # substituted by the workflow (or envsubst manually) from the cluster region
        #insecure: false
      # s3forcepathstyle: false

serviceAccount:
 create: true
 annotations:
   "eks.amazonaws.com/role-arn": "${LOKI_S3_ROLE_ARN}" # substituted from the Terraform output loki_s3_role_arn

deploymentMode: Distributed

ingester:
 replicas: 2
 zoneAwareReplication:
  enabled: false

querier:
 replicas: 2
 maxUnavailable: 2

queryFrontend:
 replicas: 2
 maxUnavailable: 1

queryScheduler:
 replicas: 2

distributor:
 replicas: 2
 maxUnavailable: 2
compactor:
 replicas: 1

indexGateway:
 replicas: 2
 maxUnavailable: 1

ruler:
 replicas: 1
 maxUnavailable: 1

chunksCache:
  allocatedMemory: 1024

# This exposes the Loki gateway so it can be written to and queried externaly
