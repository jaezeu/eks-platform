loki:
   schemaConfig:
     configs:
       - from: "2024-04-01"
         store: tsdb
         object_store: s3
         schema: v13
         index:
           prefix: loki_index_
           period: 24h
   auth_enabled: false
   storage_config:
     aws:
       region: ap-southeast-1 # for example, eu-west-2  
       bucketnames: shared-cluster-loki-chunks20250808043620623400000005 # Your actual S3 bucket name, for example, loki-aws-dev-chunks, get from the output of your TF stack
       s3forcepathstyle: false
   ingester:
       chunk_encoding: snappy
   pattern_ingester:
       enabled: true
   limits_config:
     allow_structured_metadata: true
     volume_enabled: true
     retention_period: 24h # 28 days retention
   compactor:
     retention_enabled: true 
     delete_request_store: s3
   ruler:
    enable_api: true
    storage:
      type: s3
      s3:
        region: ap-southeast-1 # for example, eu-west-2
        bucketnames: shared-cluster-loki-ruler20250808043620617600000003 # Your actual S3 bucket name, for example, loki-aws-dev-ruler, get from the output of your TF stack
        s3forcepathstyle: false
      alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring:9093 # The URL of the Alertmanager to send alerts (Prometheus, Mimir, etc.)

   querier:
      max_concurrent: 4

   storage:
      type: s3
      bucketNames:
        chunks: "shared-cluster-loki-chunks20250808043620623400000005" # Your actual S3 bucket name (loki-aws-dev-chunks)
        ruler: "shared-cluster-loki-ruler20250808043620617600000003" # Your actual S3 bucket name (loki-aws-dev-ruler)
        # admin: "<Insert s3 bucket name>" # Your actual S3 bucket name (loki-aws-dev-admin) - GEL customers only
      s3:
        region: ap-southeast-1 # eu-west-2
        #insecure: false
      # s3forcepathstyle: false

serviceAccount:
 create: true
 annotations:
   "eks.amazonaws.com/role-arn": "arn:aws:iam::255945442255:role/shared-cluster-loki-s3-role" # The service role you created

deploymentMode: Distributed

ingester:
 replicas: 2
 zoneAwareReplication:
  enabled: false

querier:
 replicas: 2
 maxUnavailable: 2

queryFrontend:
 replicas: 2
 maxUnavailable: 1

queryScheduler:
 replicas: 2

distributor:
 replicas: 2
 maxUnavailable: 2
compactor:
 replicas: 1

indexGateway:
 replicas: 2
 maxUnavailable: 1

ruler:
 replicas: 1
 maxUnavailable: 1

chunksCache:
  allocatedMemory: 1024

# This exposes the Loki gateway so it can be written to and queried externaly
gateway:
  basicAuth: 
      enabled: false
  service:
