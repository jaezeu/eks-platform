apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${EMAIL} # Replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx
# The Gateway API cluster uses a separate issuer (HTTP-01 via gatewayHTTPRoute):
# see gateway-cluster-issuer.yaml, applied by the Cilium workflow.
