apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admin-tls-certificate
  namespace: gateway
spec:
  secretName: admin-tls-secret
  dnsNames:
    - gateway-admin-prom.sctp-sandbox.com
    - gateway-admin-grafana.sctp-sandbox.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer