# SPIRE-backed mutual authentication (beta) — layered on top of values.yaml by
# init.sh (helm merges values files left to right).
#
# The embedded SPIRE server/agents install into the cilium-spire namespace.
# Cilium agents authenticate peer identities via SPIFFE SVIDs before allowing
# traffic for CiliumNetworkPolicies that set `authentication.mode: required`.
#
# NOTE: mutual authentication authenticates identities; it is NOT wire
# encryption. Pair with encryption.enabled (WireGuard/IPsec) in values.yaml
# for full mTLS-equivalent protection.
authentication:
  # Process authentication events (without this, policies requiring
  # authentication would block traffic but handshakes would never complete).
  enabled: true
  mutual:
    spire:
      enabled: true
      install:
        enabled: true
        server:
          # emptyDir instead of a PVC: the EBS CSI driver (and any StorageClass)
          # is installed by the bootstrap job AFTER Cilium, so a PVC here would
          # deadlock the install. Identities are simply re-issued if the SPIRE
          # server pod restarts — fine for a short-lived teaching cluster.
          dataStorage:
            enabled: false
          # run SPIRE server as root so it can write the socket path
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          # ensure the mounted dir is group-writable (root group here)
          podSecurityContext:
            fsGroup: 0
          # pre-create and relax perms on the socket directory
          initContainers:
            - name: fix-spire-socket-perms
              image: docker.io/library/busybox:1.37.0
              command: ["/bin/sh","-c"]
              args:
                - >
                  mkdir -p /tmp/spire-server/private &&
                  chmod 0775 /tmp/spire-server/private &&
                  chown -R 0:0 /tmp/spire-server
              volumeMounts:
                - name: spire-server-socket
                  mountPath: /tmp/spire-server/private
