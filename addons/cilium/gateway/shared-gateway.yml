# Shared Cilium Gateway: the single L7 entrypoint for the Cilium cluster.
#
# This Gateway owns only a plain HTTP :80 listener (used to serve ACME HTTP-01
# challenges and any plain-HTTP traffic). Per-app HTTPS listeners are NOT defined
# here; each add-on attaches its own via a ListenerSet (see each add-on's
# gateway-route.yaml), which is what `allowedListeners` below permits.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: gateway
spec:
  gatewayClassName: cilium
  # Let ListenerSets in any namespace attach their listeners to this Gateway.
  # (Default is None, meaning no ListenerSets allowed, so this line is required.)
  allowedListeners:
    namespaces:
      from: All
  listeners:
    # Shared HTTP :80. No hostname = matches every host, so cert-manager's
    # temporary ACME challenge HTTPRoutes (for any of the gateway-* hosts) bind
    # here. Also carries plain-HTTP routes such as the otel-demo frontend.
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
