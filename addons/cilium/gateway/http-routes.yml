# Plain-HTTP route for the otel-demo frontend, bound to the shared Gateway's
# :80 "web" listener. Applied manually (not by the workflow) once otel-demo is
# deployed.
#
# HTTPS routes do NOT live here: each add-on brings its own listener + route
# via a ListenerSet (see addons/argocd/gateway-route.yaml and
# addons/kube-prometheus-stack/gateway-route.yaml, applied by the Cilium
# workflow), same pattern as deployment-manifests-examples/gateway-api-coaching.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: otel-demo
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "gateway-frontend.sctp-sandbox.com"
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway
  hostnames:
    - gateway-frontend.sctp-sandbox.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-proxy
          port: 8080
