# Prometheus + Grafana exposed via Gateway API on the Cilium cluster.
#
# A single ListenerSet contributes two HTTPS listeners (one per hostname) onto
# the shared Gateway; two HTTPRoutes bind each hostname to its backend Service.
# The cert-manager annotation drives issuance of both certs (gateway-shim).
#
# Requires: Cilium >= 1.20.0-pre.4 (ListenerSet support) and cert-manager's
# ListenerSet reconciliation flags; both set by this repo's Cilium workflow
# (see addons/cert-manager/gateway-values.yaml).
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: monitoring-listeners
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-gateway"
spec:
  parentRef:
    name: shared-gateway
    namespace: gateway
  listeners:
    - name: prom-https
      hostname: gateway-admin-prom.sctp-sandbox.com
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: prom-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: grafana-https
      hostname: gateway-admin-grafana.sctp-sandbox.com
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prom-route
  namespace: monitoring
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "gateway-admin-prom.sctp-sandbox.com"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: monitoring-listeners
      sectionName: prom-https
  hostnames:
    - gateway-admin-prom.sctp-sandbox.com
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "gateway-admin-grafana.sctp-sandbox.com"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: monitoring-listeners
      sectionName: grafana-https
  hostnames:
    - gateway-admin-grafana.sctp-sandbox.com
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
