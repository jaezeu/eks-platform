# kube-prometheus-stack values for the Cilium (Gateway API) cluster.
#
# Prometheus and Grafana are exposed through ListenerSets + HTTPRoutes
# (see gateway-route.yaml) instead of Ingress.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
  ingress:
    enabled: false

grafana:
  ingress:
    enabled: false
  # Served on its own subdomain at root path (TLS terminated at the Gateway),
  # so Grafana only needs its external URL for correct link/redirect generation.
  grafana.ini:
    server:
      root_url: https://gateway-admin-grafana.sctp-sandbox.com

prometheus-node-exporter:
  extraArgs:
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
    - --collector.systemd
    - --collector.ethtool
