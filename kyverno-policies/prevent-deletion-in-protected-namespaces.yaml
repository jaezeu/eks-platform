apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: prevent-deletion-in-protected-namespaces
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: block-resource-deletion
      match:
        any:
          - resources:
              kinds:
                - "*"
              namespaces:
                - kube-system
                - ingress-nginx
                - cert-manager
                - external-dns
                - argocd
                - kyverno
              operations:
                - DELETE
      # Guardrail for humans only: in-cluster controllers must stay able to manage resource lifecycles, or rollouts and cert issuance in these namespaces.
      exclude:
        any:
          - subjects:
              - kind: Group
                name: system:serviceaccounts
      validate:
        message: "Deleting resources in protected namespaces is not allowed."
        deny: {}