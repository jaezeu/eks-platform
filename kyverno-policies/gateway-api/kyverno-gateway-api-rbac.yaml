# Kyverno's controllers need read access to Gateway API kinds to background-scan
# and report on the restrict-gateway-hostnames policy (admission enforcement
# works without this, but policy reports would not). Kyverno aggregates any
# ClusterRole carrying these labels into its controller roles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:read-gateway-api
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
    rbac.kyverno.io/aggregate-to-reports-controller: "true"
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "listenersets"]
    verbs: ["get", "list", "watch"]
